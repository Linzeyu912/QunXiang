version: '3.8'

services:
  # Ollama LLM service
  ollama:
    image: ollama/ollama:latest
    container_name: novel-agent-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - novel-agent-net

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: novel-agent-postgres
    environment:
      POSTGRES_DB: novel_agent
      POSTGRES_USER: novel_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel_agent -d novel_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novel-agent-net

  # pgBouncer connection pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: novel-agent-pgbouncer
    environment:
      DATABASE_URL: "postgres://novel_agent:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/novel_agent"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - novel-agent-net

volumes:
  ollama-data:
    driver: local
  postgres-data:
    driver: local

networks:
  novel-agent-net:
    driver: bridge
